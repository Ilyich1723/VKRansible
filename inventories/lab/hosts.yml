---
all:
  vars:
    ansible_user: vagrant
    ansible_ssh_private_key_file: /root/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:
    web:
      hosts:
        web1:
          ansible_host: 10.39.14.114
          ansible_port: 2201
          private_ip: 192.168.56.11

    db:
      hosts:
        db1:
          ansible_host: 10.39.14.114
          ansible_port: 2202
          private_ip: 192.168.56.12

    files:
      hosts:
        files1:
          ansible_host: 10.39.14.114
          ansible_port: 2203
          private_ip: 192.168.56.13
          ansible_ssh_private_key_file: /root/.ssh/files1_vagrant_rsa
          ansible_ssh_common_args: "-o IdentitiesOnly=yes -o PubkeyAcceptedAlgorithms=+ssh-rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    backup_server:
      children:
        files: {}

    backup_clients:
      children:
        web: {}
        db: {}