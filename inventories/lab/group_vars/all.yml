---
common_packages:
  - ca-certificates
  - curl
  - gnupg
  - openssh-server
  - python3
  - python3-apt
  - rsync
  - sudo
  - ufw
  - unzip
  - wget
  - neofetch

ssh_password_authentication: "no"
ssh_permit_root_login: "no"
ssh_pubkey_authentication: "yes"
ssh_x11_forwarding: "no"
ssh_use_pam: "yes"

ufw_default_incoming: deny
ufw_default_outgoing: allow
ufw_allowed_tcp:
  - 22

lab_private_network: 192.168.56.0/24

backup_delegate_host: files1
backup_runtime_host: 192.168.56.13
backup_user: borgbackup
backup_group: borgbackup
backup_repo_base: /srv/borg/repos
backup_repo_mode: '0700'
backup_ssh_key_path: /root/.ssh/id_ed25519_borg
backup_borg_passphrase: "12345"
backup_archive_prefix: "{{ inventory_hostname }}"
backup_retention_daily: 7
backup_retention_weekly: 4
backup_retention_monthly: 3
backup_compression: lz4
backup_script_path: /usr/local/bin/borg-backup.sh
backup_cron_minute: '30'
backup_cron_hour: '3'
backup_log_path: /var/log/borg-backup.log
backup_extra_env: {}
