---
- name: Остановить автоматические службы apt, если они запущены
  ansible.builtin.shell: |
    systemctl stop unattended-upgrades.service || true
    systemctl stop apt-daily.service apt-daily.timer || true
    systemctl stop apt-daily-upgrade.service apt-daily-upgrade.timer || true
  changed_when: false

- name: Дождаться освобождения блокировок dpkg/apt
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
          fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
          fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 5
    done
  changed_when: false

- name: Исправить незавершённое состояние dpkg
  ansible.builtin.shell: |
    dpkg --configure -a
    apt-get -f install -y
  changed_when: false

- name: Обновить кэш apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 300

- name: Установить минимальный набор общих пакетов
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    lock_timeout: 300
