---
- name: Установить пакеты файлового сервера
  ansible.builtin.apt:
    name: "{{ samba_packages }}"
    state: present
    update_cache: true

- name: Создать директорию сетевого ресурса
  ansible.builtin.file:
    path: "{{ samba_share_path }}"
    state: directory
    owner: "{{ samba_share_owner }}"
    group: "{{ samba_share_group }}"
    mode: "{{ samba_share_dir_mode }}"

- name: Развернуть конфигурацию Samba
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    validate: "testparm -s %s"
  notify: restart samba

- name: Разрешить Samba в UFW
  community.general.ufw:
    rule: allow
    name: Samba

- name: Включить и запустить службы Samba
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ samba_services }}"
